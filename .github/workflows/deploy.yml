name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build release (static binary)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/x86_64-unknown-linux-musl/release/bixi-tracker"
          target: "/opt/bixi-tracker/temp"
          strip_components: 4

      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/"
          target: "/opt/bixi-tracker/public"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mv /opt/bixi-tracker/temp/bixi-tracker /opt/bixi-tracker/bixi-tracker
            chmod +x /opt/bixi-tracker/bixi-tracker
            sudo systemctl restart bixi-tracker
            sudo systemctl is-active --quiet bixi-tracker && echo "Service running" || echo "Service failed"