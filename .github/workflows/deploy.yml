name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'public/**'

      - name: Cache Cargo
        if: steps.filter.outputs.rust == 'true'
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        if: steps.filter.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        if: steps.filter.outputs.rust == 'true'
        run: sudo apt-get install -y musl-tools

      - name: Build release
        if: steps.filter.outputs.rust == 'true'
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Move to dist
        if: steps.filter.outputs.rust == 'true'
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/bixi-tracker dist/

      - name: Copy binary to server
        if: steps.filter.outputs.rust == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/bixi-tracker"
          target: "/opt/bixi-tracker/temp"
          strip_components: 1
          overwrite: true

      - name: Copy frontend to server
        if: steps.filter.outputs.frontend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/**"
          target: "/opt/bixi-tracker/public"
          strip_components: 1
          overwrite: true

      - name: Restart service
        if: steps.filter.outputs.rust == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          request_pty: true
          script: |
            if [ -f /opt/bixi-tracker/temp/bixi-tracker ]; then
              mv /opt/bixi-tracker/temp/bixi-tracker /opt/bixi-tracker/bixi-tracker
              chmod +x /opt/bixi-tracker/bixi-tracker
              sudo /usr/bin/systemctl restart bixi-tracker
            fi