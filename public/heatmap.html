<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIXI Chaleur — Densité des départs</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('bixi-theme')||'light');</script>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#141820" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BIXI Tracker" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="heatmap.css" />
</head>
<body>

  <div id="loader">
    <div class="loader-row">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="loader-label">Chargement de la densité…</div>
  </div>

  <div id="navLinks">
    <a class="nav-link" href="/">← Tracker</a>
    <a class="nav-link" href="/atlas.html">🗺 Atlas</a>
    <a class="nav-link" href="/history.html">📈 Historique</a>
    <button id="themeToggle" class="nav-link" style="cursor:pointer;font-family:inherit;">🌙 Sombre</button>
  </div>

  <button id="legendToggle">📊 Légende</button>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-title">Densité des départs</div>
    <div class="gradient-bar"></div>
    <div class="gradient-labels"><span>Faible</span><span>Intense</span></div>
  </div>

  <div id="panel">
    <div class="panel-time"><span id="hourDisplay">17</span>:00</div>
    <input type="range" id="hourSlider" min="0" max="23" value="17" step="1" />
    <div class="panel-stats" id="statsDisplay">Chargement…</div>
    <div class="panel-actions">
      <div class="city-btns">
        <button class="city-btn active" data-city="montreal">Montréal</button>
        <button class="city-btn" data-city="sherbrooke">Sherbrooke</button>
      </div>
      <input type="date" id="datePicker" />
      <button class="panel-btn" id="btnWeek">📅 Semaine</button>
      <button class="panel-btn" id="btnPlay">▶ Lecture</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script type="module" src="js/heatmap.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
