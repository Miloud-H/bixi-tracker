<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIXI Atlas — Flux de Montréal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="atlas.css" />
</head>
<body>

  <div id="loader">
    <div class="loader-row">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="loader-label">Chargement des flux…</div>
  </div>

  <div id="navLinks" style="position:fixed;top:16px;left:16px;display:flex;gap:8px;z-index:1000;">
    <a id="backLink" href="/">← Tracker</a>
    <a href="/heatmap.html">🌡 Chaleur</a>
    <a href="/history.html">📈 Historique</a>
  </div>
  <button id="legendToggle">📋 Légende</button>

  <div id="focusInfo"></div>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-title">Zones</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00d2ff"></div>Transit / Métro</div>
    <div class="legend-item"><div class="legend-dot" style="background:#bb86fc"></div>Éducation</div>
    <div class="legend-item"><div class="legend-dot" style="background:#69f0ae"></div>Résidentiel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd740"></div>Commerce / Affaires</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff4081"></div>Vie nocturne</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff5252"></div>Santé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffff00"></div>Loisirs / Parcs</div>

    <div class="legend-title">Vue globale</div>
    <div class="legend-item"><div class="legend-line" style="background:#00d2ff"></div>Fluide (> 10 km/h)</div>
    <div class="legend-item"><div class="legend-line" style="background:#ff3333"></div>Lent (≤ 10 km/h)</div>

    <div class="legend-title">Mode focus</div>
    <div class="legend-item"><div class="legend-line" style="background:#00e676"></div>Arrivées</div>
    <div class="legend-item"><div class="legend-line" style="background:#ff1744"></div>Départs</div>
  </div>

  <div id="panel">
    <div class="panel-time">
      <span id="hourDisplay">08:00</span>
    </div>
    <input type="range" id="hourSlider" min="0" max="23" value="8" step="1" />
    <div class="panel-stats" id="statsDisplay">Chargement…</div>
    <div class="panel-actions">
      <div style="display:flex;gap:4px;">
        <button class="panel-btn active" data-city="montreal">Montréal</button>
        <button class="panel-btn" data-city="sherbrooke">Sherbrooke</button>
      </div>
      <input type="date" id="datePicker" />
      <button class="panel-btn" id="btnPlay">▶ Lecture</button>
      <button class="panel-btn" id="btnReset">↺ Réinitialiser</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/atlas.js"></script>
</body>
</html>
