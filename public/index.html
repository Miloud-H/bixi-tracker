<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIXI Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <div id="controls">
    <div class="panel-header">
      <div class="panel-title">
        <span class="status-dot"></span>
        BIXI Tracker
      </div>
      <button id="themeToggle">🌙 Sombre</button>
    </div>

    <label>Date
      <input type="date" id="datePicker" />
    </label>
    <hr>

    <label>Trajets actifs à
      <div class="time-display">
        <span class="time-value" id="timeLabel">12:00</span>
      </div>
      <div class="slider-wrapper">
        <canvas id="histogramCanvas"></canvas>
        <input type="range" id="timeSlider" min="0" max="1439" value="720" />
      </div>
    </label>

    <label style="margin-top:8px;">
      <input type="checkbox" id="showAllTrips" />
      <span style="display:inline;text-transform:none;font-size:13px;letter-spacing:0;">Toute la journée</span>
    </label>

    <button id="togglePlay">▶ Lecture</button>

    <button id="btnChart">📊 Activité journalière</button>
    <div id="chartPanel">
      <canvas id="dailyChart"></canvas>
    </div>

    <hr>

    <label>Distance minimale
      <div class="distance-filter">
        <input type="range" id="distSlider" min="0" max="5000" step="50" value="0" />
        <span class="distance-value" id="distLabel">0 m</span>
      </div>
    </label>

    <hr>

    <button id="btnNearby">📍 Arrivées à ma station</button>
    <div id="nearbyResults"></div>

    <label>Recherche par ID vélo
      <input type="text" id="bikeSearch" placeholder="ex: E12345" />
    </label>
    <div class="btn-row">
      <button id="btnSearch">Chercher</button>
      <button id="btnReset">↺ Reset</button>
    </div>

    <div id="bikeResults"></div>

    <hr>
    <label style="margin-bottom:6px;">Top stations (arrivées)</label>
    <div id="statsPanel"></div>
  </div>

  <div id="liveStats">
    🟢 <span id="statActive">–</span> actifs &nbsp;|&nbsp;
    ⚡ <span id="statCount">0</span> trajets &nbsp;|&nbsp;
    📈 <span id="statDist">0</span> km &nbsp;|&nbsp;
    👥 <span id="groupCount">0</span> groupes
  </div>

  <div id="alertBox"></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
