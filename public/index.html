<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIXI Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <div id="panelOverlay"></div>
  <button id="panelToggle" aria-label="Menu">☰</button>

  <div id="controls">

    <!-- ── En-tête ── -->
    <div class="panel-header">
      <div class="panel-title">
        <span class="status-dot"></span>
        BIXI Tracker
      </div>
      <button id="themeToggle">🌙 Sombre</button>
    </div>

    <!-- ── Section : Exploration temporelle ── -->
    <section class="panel-section">
      <div class="section-label">Exploration</div>

      <div class="city-selector">
        <button class="city-btn active" data-city="montreal">Grand Montréal</button>
        <button class="city-btn" data-city="sherbrooke">Sherbrooke</button>
        <button class="city-btn" data-city="all">Toutes</button>
      </div>

      <label class="field-label">Date
        <input type="date" id="datePicker" />
      </label>

      <div class="time-block">
        <div class="time-header">
          <span class="field-label" style="margin:0;">Trajets actifs à</span>
          <div class="time-actions">
            <button id="btnNow" class="btn-ghost" title="Revenir à maintenant">⟳ Maintenant</button>
          </div>
        </div>
        <div class="time-display">
          <span class="time-value" id="timeLabel">12:00</span>
          <span class="trip-count-inline" id="tripCountInline">– trajets</span>
        </div>
        <div class="slider-wrapper">
          <canvas id="histogramCanvas"></canvas>
          <input type="range" id="timeSlider" min="0" max="1439" value="720" />
        </div>
        <div class="time-footer">
          <label class="checkbox-label">
            <input type="checkbox" id="showAllTrips" />
            Toute la journée
          </label>
          <div class="play-row">
            <button id="togglePlay" class="btn-play">▶ Lecture</button>
            <button id="btnChart" class="btn-ghost">📊 Courbe</button>
          </div>
        </div>
      </div>

      <div id="chartPanel">
        <canvas id="dailyChart"></canvas>
      </div>
    </section>

    <!-- ── Section : Filtres ── -->
    <section class="panel-section">
      <div class="section-label">Filtres</div>
      <label class="field-label">Distance minimale
        <div class="distance-filter">
          <input type="range" id="distSlider" min="0" max="5000" step="50" value="0" />
          <span class="distance-value" id="distLabel">0 m</span>
        </div>
      </label>
    </section>

    <!-- ── Section : Station proche ── -->
    <section class="panel-section">
      <div class="section-label">Ma station</div>
      <button id="btnNearby" class="btn-nearby">📍 Voir les arrivées récentes</button>
      <div id="nearbyResults"></div>
    </section>

    <!-- ── Section : Recherche ── -->
    <section class="panel-section">
      <div class="section-label">Recherche</div>
      <label class="field-label">ID vélo
        <div class="search-row">
          <input type="text" id="bikeSearch" placeholder="ex: E12345" />
          <button id="btnSearch">↵</button>
        </div>
      </label>
      <button id="btnReset" class="btn-ghost" style="width:100%;margin-top:4px;">↺ Tout réinitialiser</button>
      <div id="bikeResults"></div>
    </section>

    <!-- ── Section : Stats ── -->
    <section class="panel-section">
      <div class="section-label">Top stations (arrivées)</div>
      <div id="statsPanel"></div>
    </section>

    <!-- ── Nav mobile (cachée sur desktop) ── -->
    <div id="panelNav">
      <a href="/atlas.html">Atlas</a>
      <a href="/heatmap.html">Chaleur</a>
      <a href="/history.html">Historique</a>
    </div>

  </div>

  <!-- ── Barre de stats ── -->
  <div id="liveStats">
    <div class="stat-pill" title="Vélos actuellement en transit (absents du feed depuis 90s+)">
      <span class="stat-pill-icon">🟢</span>
      <span id="statActive">–</span>
      <span class="stat-pill-label">en route</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill" title="Trajets visibles selon les filtres actifs / total de la journée">
      <span class="stat-pill-icon">⚡</span>
      <span id="statCount">0</span><span class="stat-pill-sep">/</span><span id="statDayTotal">–</span>
      <span class="stat-pill-label">trajets</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill" title="Distance totale des trajets visibles">
      <span class="stat-pill-icon">📍</span>
      <span id="statDist">0</span>
      <span class="stat-pill-label">km</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill" title="Groupes de vélos ayant fait le même trajet simultanément">
      <span class="stat-pill-icon">👥</span>
      <span id="groupCount">0</span>
      <span class="stat-pill-label">groupes</span>
    </div>
  </div>

  <div id="alertBox"></div>
  <div id="map"></div>

  <div id="stationCard">
    <div class="sc-header">
      <div class="sc-name" id="scName"></div>
      <button class="sc-close" id="scClose" onclick="window.app.closeStationCard()">×</button>
    </div>
    <div class="sc-pills">
      <div class="sc-pill"><span class="sc-val" id="scArrivals">0</span><span class="sc-lbl">arrivées</span></div>
      <div class="sc-pill"><span class="sc-val" id="scDepartures">0</span><span class="sc-lbl">départs</span></div>
    </div>
    <div class="sc-section-lbl">Arrivées par heure</div>
    <canvas id="scChart"></canvas>
    <div class="sc-section-lbl">Top origines</div>
    <div id="scOrigins"></div>
  </div>

  <nav id="pageNav">
    <a href="/atlas.html">Atlas</a>
    <a href="/heatmap.html">Chaleur</a>
    <a href="/history.html">Historique</a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    const _toggle = document.getElementById('panelToggle');
    const _controls = document.getElementById('controls');
    const _overlay = document.getElementById('panelOverlay');
    _toggle.addEventListener('click', () => {
      _controls.classList.toggle('open');
      _overlay.classList.toggle('visible');
    });
    _overlay.addEventListener('click', () => {
      _controls.classList.remove('open');
      _overlay.classList.remove('visible');
    });
  </script>
</body>
</html>
